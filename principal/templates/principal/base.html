    background: #e74c3c;
    color: white;
}

.gris{
    background: #bdc3c7;
}

.col-title{

    text-align:center;
    font-weight:bold;
    margin-bottom:10px;
    padding:6px 10px;

    background:linear-gradient(145deg,#1b5e20,#2e7d32);
    color:white;

    border-radius:6px;
    font-size:14px;
    letter-spacing:1px;

    box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.final-title{

    background:linear-gradient(145deg,#ff9800,#ff5722);
    font-size:16px;
}

.box:hover{

    transform:scale(1.05);
}

/* ============================= */
/* 📱 TABLET (max 1024px) */
/* ============================= */

@media (max-width: 1024px) {

    .bracket {
        gap: 25px;
        padding: 20px 10px;
    }

    .round {
        min-width: 95px;
    }

    .round h4 {
        font-size: 12px;
    }

    .center-final {
        min-width: 120px;
    }

}

/* ============================= */
/* 📱 MÓVIL (max 768px) */
/* ============================= */

@media (max-width: 768px) {

    .bracket {
        flex-direction: column; /* 🔥 cambia a vertical */
        align-items: center;
        gap: 30px;
    }

    .side {
        flex-direction: column; /* columnas se apilan */
        align-items: center;
    }

    .round {
        width: 100%;
        max-width: 300px;
    }

    .center-final {
        order: -1; /* 🔥 pone la final arriba */
    }

    .match:hover {
        transform: none; /* quita zoom en móvil */
    }

}

/* ============================= */
/* 📱 MÓVIL PEQUEÑO (max 480px) */
/* ============================= */

@media (max-width: 480px) {

    .round {
        max-width: 250px;
    }

    .submit-container button {
        width: 100%;
    }

}

</style>
